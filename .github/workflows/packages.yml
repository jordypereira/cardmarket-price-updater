name: Build Extension Packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox package (.xpi)
        run: npm run package:firefox

      - name: Build Chrome package (.zip)
        run: npm run package:chrome

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v5
        with:
          name: cardmarket-price-updater-firefox
          path: exports/cardmarket-price-updater-firefox.xpi
          if-no-files-found: error

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v5
        with:
          name: cardmarket-price-updater-chrome
          path: exports/cardmarket-price-updater-chrome.zip
          if-no-files-found: error

      - name: Publish release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            exports/cardmarket-price-updater-firefox.xpi
            exports/cardmarket-price-updater-chrome.zip

  publish-github-package:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@jordypereira'

      - name: Install dependencies
        run: npm ci

      - name: Prepare scoped package metadata for GitHub Packages
        run: |
          npm pkg set name='@jordypereira/cardmarket-price-updater'
          npm pkg set publishConfig.registry='https://npm.pkg.github.com'
          npm pkg set publishConfig.access='public'

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
