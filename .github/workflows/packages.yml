name: Build Extension Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Firefox package (.xpi)
        run: npm run package:firefox

      - name: Build Chrome package (.zip)
        run: npm run package:chrome

      - name: Upload Firefox artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardmarket-price-updater-firefox
          path: exports/cardmarket-price-updater-firefox.xpi
          if-no-files-found: error

      - name: Upload Chrome artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardmarket-price-updater-chrome
          path: exports/cardmarket-price-updater-chrome.zip
          if-no-files-found: error

      - name: Publish release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            exports/cardmarket-price-updater-firefox.xpi
            exports/cardmarket-price-updater-chrome.zip
